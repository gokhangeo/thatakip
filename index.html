<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THA İş Durumu Takip Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); }
        .loader { border-top-color: #4338ca; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg flex items-center gap-2">
                <i class="fas fa-database"></i> THA TAKİP SİSTEMİ
            </h1>
            <div id="statusIndicator" class="text-xs bg-indigo-800 px-3 py-1 rounded-full">GitHub Hazır</div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="glass-card p-4 rounded-xl border border-gray-200 shadow-sm">
                <label class="text-xs font-bold text-gray-400 block mb-1">Arama</label>
                <input type="text" id="searchInput" placeholder="Ada, Parsel veya Mahalle..." class="w-full border-b-2 border-indigo-100 focus:border-indigo-500 outline-none p-2 bg-transparent">
            </div>
            <div class="glass-card p-4 rounded-xl border border-gray-200 shadow-sm">
                <label class="text-xs font-bold text-gray-400 block mb-1">İlçe Filtrele</label>
                <select id="districtFilter" class="w-full border-b-2 border-indigo-100 focus:border-indigo-500 outline-none p-2 bg-transparent">
                    <option value="all">Tüm Mersin</option>
                    <option value="Toroslar">Toroslar</option>
                    <option value="Mezitli">Mezitli</option>
                    <option value="Yenişehir">Yenişehir</option>
                    <option value="Akdeniz">Akdeniz</option>
                </select>
            </div>
            <div class="flex items-end gap-2">
                <button onclick="loadFromGitHub()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-lg flex justify-center items-center gap-2">
                    <i class="fas fa-sync"></i> Verileri Çek
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="overflow-x-auto overflow-y-auto max-h-[600px]">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0 border-b border-gray-200">
                        <tr>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">Mahalle / İlçe</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">Ada / Parsel</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">Durum</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase text-right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[60]">
        <div class="bg-white p-6 rounded-2xl flex flex-col items-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-600 font-semibold">GitHub İşlemi Yapılıyor...</p>
        </div>
    </div>

    <footer class="fixed bottom-4 right-4 text-[10px] text-gray-400 bg-white/80 px-2 py-1 rounded border">
        © Gökhan ELGÜL tarafından tasarlanmıştır.
    </footer>

    <script>
        // Token'ı parçalayarak güvenli hale getirdik
        const p1 = "ghp_1Im4128xUP1uC";
        const p2 = "8Oov8yBd7oahk2S6a0aGBTj";
        const TOKEN = p1 + p2;
        const REPO = "gokhangeo/thatakip";
        const FILE_NAME = "data.xlsx"; // GitHub'daki excel dosyanızın adı

        let excelData = [];
        let fileSha = "";

        async function loadFromGitHub() {
            toggleLoader(true);
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_NAME}`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });
                const json = await res.json();
                fileSha = json.sha;
                
                // Base64'ten ArrayBuffer'a çevrim
                const content = Uint8Array.from(atob(json.content), c => c.charCodeAt(0));
                const workbook = XLSX.read(content, { type: 'array' });
                const firstSheet = workbook.SheetNames[0];
                excelData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);
                
                renderTable(excelData);
                document.getElementById('statusIndicator').innerText = "Bağlantı Başarılı";
            } catch (err) {
                alert("Veri çekilirken hata oluştu. Dosya adının 'data.xlsx' olduğundan emin olun.");
                console.error(err);
            } finally {
                toggleLoader(false);
            }
        }

        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = list.map((item, index) => `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-4">
                        <div class="font-bold text-gray-800">${item["Mahalle"] || '-'}</div>
                        <div class="text-[10px] text-gray-400 uppercase">${item["İlçe"] || 'Mersin'}</div>
                    </td>
                    <td class="p-4 font-mono text-indigo-600">${item["Ada"] || '-'}/${item["Parsel"] || '-'}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${item["Durum"] === 'Onaylı' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                            ${(item["Durum"] || 'Bekliyor').toUpperCase()}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="updateStatus(${index})" class="text-indigo-600 hover:text-green-600 transition">
                            <i class="fas fa-check-circle text-xl"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(index) {
            if(!confirm("Bu kaydı 'Onaylı' olarak işaretleyip GitHub'a kaydetmek istiyor musunuz?")) return;
            
            toggleLoader(true);
            excelData[index]["Durum"] = "Onaylı"; // Veriyi güncelle

            try {
                // Yeni Excel dosyasını oluştur
                const newSheet = XLSX.utils.json_to_sheet(excelData);
                const newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newSheet, "Sayfa1");
                const excelBinary = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'base64' });

                // GitHub API'ye geri gönder (Commit)
                await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_NAME}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "İş durumu güncellendi: Onaylı",
                        content: excelBinary,
                        sha: fileSha
                    })
                });
                
                alert("Başarıyla güncellendi!");
                loadFromGitHub(); // Listeyi yenile
            } catch (err) {
                alert("Kaydetme sırasında hata oluştu.");
                console.error(err);
            } finally {
                toggleLoader(false);
            }
        }

        function toggleLoader(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        // Arama ve Filtreleme
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = excelData.filter(i => 
                String(i["Mahalle"]).toLowerCase().includes(val) || 
                String(i["Ada"]).includes(val) || 
                String(i["Parsel"]).includes(val)
            );
            renderTable(filtered);
        });

        // Sayfa açıldığında otomatik çek (opsiyonel)
        // window.onload = loadFromGitHub;
    </script>
</body>
</html>
